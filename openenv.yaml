name: support_ops_env
description: Multi-step customer support automation environment
version: 1.0
entry_point: env.core:SupportOpsEnv
observation_space:
  type: object
action_space:
  type: object
reward_space:
  type: object
tasks:
  - name: classification_easy
    description: Classify support ticket
    grader: env.graders:classification_grader

  - name: action_medium
    description: Take correct action
    grader: env.graders:action_grader

  - name: resolution_hard
    description: Fully resolve ticket
    grader: env.graders:resolution_grader
